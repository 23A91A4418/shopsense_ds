version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shopsense_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    build: .
    container_name: shopsense_mlflow
    restart: always
    command: mlflow server --backend-store-uri postgresql://postgres:admin123@db:5432/postgres --default-artifact-root /app/mlruns --host 0.0.0.0 --port 5000 --allowed-hosts *
    ports:
      - "5000:5000"
    environment:
      MLFLOW_ALLOW_FILE_STORE: "true"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    container_name: shopsense_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ALLOW_FILE_STORE: "true"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started

volumes:
  postgres_data:
